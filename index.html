<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>A Puzzle A Day - 每日拼图</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <h1 class="title" data-i18n="title">A Puzzle A Day</h1>
            <div class="header-controls">
                <button id="btn-lang" class="btn-icon" title="Language">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                </button>
                <button id="btn-theme" class="btn-icon" title="Theme">
                    <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </button>
                <button id="btn-history" class="btn-icon" title="History">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                </button>
                <button id="btn-help" class="btn-icon" title="Help">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Date Display -->
        <div id="date-display" class="date-display">
            <span class="date-label" data-i18n="today">今日目标</span>
            <span id="target-date" class="date-target"></span>
            <button id="btn-return-today" class="btn-return-today" data-i18n="return_to_today" style="display:none;"></button>
        </div>

        <!-- Game Area: Tray + Bank -->
        <div id="game-area">
            <div id="board-container">
                <canvas id="board-canvas"></canvas>
            </div>
            <div id="piece-bank" class="piece-bank">
                <div id="piece-list" class="piece-list"></div>
            </div>
        </div>

        <!-- Controls -->
        <div id="controls" class="controls">
            <button id="btn-reset" class="btn-action btn-danger">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="17 1 21 5 17 9"/>
                    <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                    <polyline points="7 23 3 19 7 15"/>
                    <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                </svg>
                <span data-i18n="reset">重置</span>
            </button>
            <button id="btn-undo" class="btn-action">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"/>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                </svg>
                <span data-i18n="undo">撤销</span>
            </button>
        </div>

        <!-- Win Dialog -->
        <div id="win-overlay" class="overlay hidden">
            <div class="dialog">
                <h2 data-i18n="congrats">🎉 恭喜！</h2>
                <p data-i18n="solved">你完成了今天的拼图！</p>
                <p id="win-date"></p>
                <button id="btn-close-win" class="btn-action" data-i18n="close">关闭</button>
            </div>
        </div>

        <!-- History Dialog -->
        <div id="history-overlay" class="overlay hidden">
            <div class="dialog history-dialog">
                <h2 data-i18n="history">拼图历史</h2>
                <!-- Calendar Navigation -->
                <div class="calendar-nav">
                    <button id="cal-prev-year" class="cal-nav-btn" title="Previous year">◀◀</button>
                    <button id="cal-prev-month" class="cal-nav-btn" title="Previous month">◀</button>
                    <span id="cal-month-year" class="cal-month-year"></span>
                    <button id="cal-next-month" class="cal-nav-btn" title="Next month">▶</button>
                    <button id="cal-next-year" class="cal-nav-btn" title="Next year">▶▶</button>
                </div>
                <!-- Calendar Grid -->
                <div id="calendar-grid" class="calendar-grid"></div>
                <button id="btn-close-history" class="btn-action" data-i18n="close">关闭</button>
            </div>
        </div>

        <!-- Language Dialog -->
        <div id="lang-overlay" class="overlay hidden">
            <div class="dialog">
                <h2 data-i18n="select_lang">选择语言</h2>
                <div id="lang-list" class="lang-list"></div>
                <button id="btn-close-lang" class="btn-action" data-i18n="close">关闭</button>
            </div>
        </div>

        <!-- Help Dialog -->
        <div id="help-overlay" class="overlay hidden">
            <div class="dialog help-dialog">
                <h2 data-i18n="help_title">游戏帮助</h2>
                <div class="help-content">
                    <div class="help-section">
                        <h3 data-i18n="help_controls_title">操作方式</h3>
                        <ul>
                            <li data-i18n="help_ctrl_drag">拖拽方块到托盘</li>
                            <li data-i18n="help_ctrl_rotate">单击方块旋转</li>
                            <li data-i18n="help_ctrl_flip">双击方块翻转</li>
                            <li data-i18n="help_ctrl_return">从托盘拖回方块到待选区</li>
                        </ul>
                    </div>
                    <div class="help-section">
                        <h3 data-i18n="help_goal_title">胜利条件</h3>
                        <p data-i18n="help_goal">用所有方块填满托盘，仅露出今日的月份、日期（和对应变体的星期）。</p>
                    </div>
                </div>
                <div class="help-footer">
                    <span data-i18n="help_footer_prefix">由 DeepSeek V4 Pro 生成，设计来自</span>
                    <a href="https://hanasaka.net" target="_blank" rel="noopener">hanasaka.net</a>
                </div>
                <button id="btn-close-help" class="btn-action" data-i18n="close">关闭</button>
            </div>
        </div>

        <!-- Variant Selector Dialog -->
        <div id="variant-overlay" class="overlay hidden">
            <div class="dialog variant-dialog">
                <h2 data-i18n="select_variant">Select Puzzle</h2>
                <div id="variant-list" class="variant-list"></div>
                <button id="btn-close-variant" class="btn-action" data-i18n="close">关闭</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
